name: Build APK from ZIP

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          mkdir project
          unzip MinimalLauncher.zip -d project
          echo "=== After unzip ==="
          ls -R project

      - name: Find gradlew & build
        run: |
          cd project

          # gradlew file locate karega automatically
          GRADLEW_PATH=$(find . -type f -name "gradlew" | head -n 1)

          echo "Found gradlew at: $GRADLEW_PATH"

          if [ -z "$GRADLEW_PATH" ]; then
            echo "❌ gradlew file not found"
            exit 1
          fi

          # folder jaha gradlew hai waha jao
          cd $(dirname "$GRADLEW_PATH")
          

          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            project/**/app/build/outputs/apk/debug/app-debug.apk
