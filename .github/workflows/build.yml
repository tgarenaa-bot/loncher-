name: Build APK from ZIP

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip MinimalLauncher.zip
          echo "=== Files ==="
          ls -R

      - name: Build APK
        run: |
          GRADLEW=$(find . -type f -name "gradlew" | head -n 1)

          echo "Gradlew path: $GRADLEW"

          if [ -z "$GRADLEW" ]; then
            echo "❌ gradlew not found"
            exit 1
          fi

          cd "$(dirname "$GRADLEW")"

          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
